name: Supabase Keepalive

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call keepalive RPC
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_ANON_KEY"

          PROJECT_REF="$(printf '%s' "$SUPABASE_URL" | sed -E 's#https://([^.]+)\.supabase\.co/?#\1#')"
          echo "Pinging Supabase project ref: $PROJECT_REF"

          RESPONSE="$(curl --fail --silent --show-error \
            --request POST \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --header "Content-Type: application/json" \
            --data "{\"p_source\":\"github-actions:${GITHUB_RUN_ID}\"}" \
            "$SUPABASE_URL/rest/v1/rpc/keepalive_ping")"

          echo "Keepalive RPC returned: $RESPONSE"
